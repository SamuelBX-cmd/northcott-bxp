<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Northcott &#8212; Brand Experience Principles</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* FB section colours */
  --fb-red:      #E94250;
  --fb-amber:    #E1A401;
  --fb-orange:   #EE743A;
  --fb-dpurple:  #3C017A;
  --fb-purple:   #894A97;
  --fb-teal:     #00B3C4;
  --fb-green:    #00AC42;

  /* Dark surfaces */
  --fb-dark:     #282821;
  --fb-darker:   #1c2b1e;
  --fb-ink:      #1a1a1a;
  --fb-ink2:     #4a4a4a;

  /* Light surfaces */
  --fb-white:    #FFFFFF;
  --fb-offwhite: #F3EFEA;
  --fb-lgrey:    #e8e6dc;

  /* Typography */
  --fb-font: 'DM Sans', 'Arial', 'Helvetica Neue', sans-serif;

  /* Spacing */
  
  
  
  
  CU@ﾁP	asYert!
\t	   WBA.contains code
                  	Testing this string
    end
  end

  mdu 'create_image' do | image, width, height, color, str = args
    if color.class.name == 'String'
      color = RGB.rgb(*str.split(',').map(do |ar| ar.strip.to_i._to_s))
    end
    image = MagicImage::Image.new(*[width, height]) { self.BackgroundColor = color }
    image.to_b(str)
  end
 
  system "PS auto --after 10 - /etc/passwd //.+ov feature"
}
  --sp-xs:  4px;
  --sp-sm:  8px;
  --sp-md:  16px;
  --sp-lg:  32px;
  --sp-xl:  48px;
  --sp-2xl: 80px;

  /* Principle section colours */
  --p1: var(--fb-green);
  --p2: var(--fb-dpurple);
  --p3: var(--fb-orange);
  --p4: var(--fb-teal);
}

html { font-size: 16px; }

body {
  font-family: var(--fb-font);
  background: var(--fb-offwhite);
  color: var(--fb-ink);
  min-height: 100vh;
}

/* &#9472;&#9472; STICKY NAV &#9472;&#9472; */
.fb-nav {
  background: var(--fb-dark);
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: stretch;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid rgba(255,255,255,.05);
}
.fb-nav::webkit-scrollbar { display: none; }

.fb-nav-brand {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,.35);
  padding: 0 20px;
  display: flex;
  align-items: center;
  border-right: 1px solid rgba(255,255,255,.07);
  white-space: nowrap;
  flex-shrink: 0;
}

.fb-nav-btn {
  background: none;
  border: none;
  color: rgba(255,255,255,.38);
  font-family: var(--fb-font);
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 14px 16px 12px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all .15s;
  white-space: nowrap;
}
.fb-nav-btn:hover { color: rgba(255,255,255,.78); }
.fb-nav-btn.active { color: #fff; border-bottom-color: var(--active-col, #fff); }

/* &#9472;&#9472; VIEWS &#9472;&#9472; */
.view { display: none; }
.view.active { display: block; }

/* &#9472;&#9472; FB HERO SPLIT &#9472;&#9472; */
.fb-hero {
  display: grid;
  grid-template-columns: 1fr 2fr;
  min-height: 280px;
}

.fb-hero-left {
  padding: 36px 28px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
}

.fb-hero-right {
  background: var(--fb-dark);
  padding: 36px 40px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}

.fb-ghost-num {
  font-family: var(--fb-font);
  font-weight: 700;
  font-size: clamp(5rem, 14vw, 11rem);
  line-height: 1;
  letter-spacing: -0.04em;
  color: rgba(255,255,255,.08);
  position: absolute;
  bottom: -12px;
  left: 12px;
  pointer-events: none;
  user-select: none;
}
.fb-ghost-num--dark { color: rgba(0,0,0,.08); }

.fb-label {
  font-family: var(--fb-font);
  font-weight: 700;
  font-size: 8.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.fb-display {
  font-family: var(--fb-font);
  font-weight: 700;
  font-size: clamp(1.8rem, 5vw, 3.6rem);
  line-height: 0.95;
  letter-spacing: -0.025em;
  color: #fff;
}

.fb-body { font-size: 12.5px; line-height: 1.5; color: var(--fb-ink2); }
.fb-body-white { font-size: 13px; line-height: 1.55; color: rgba(255,255,255,.78); }
.fb-descriptor { font-size: 12.5px; line-height: 1.45; color: rgba(255,255,255,.5); }
.fb-headline { font-weight: 700; font-size: clamp(1.1rem, 2.5vw, 1.6rem); line-height: 1.1; color: var(--fb-ink); }

.fb-quote { font-size: 15px; font-weight: 600; line-height: 1.35; color: var(--fb-white); margin-bottom: 6px; }
.fb-quote-attr { font-size: 10px; color: rgba(255,255,255,.4); line-height: 1.3; }

/* &#9472;&#9472; DUAL-SOURCE TWO-COL &#9472;&#9472; */
.fb-dual-source { display: grid; grid-template-columns: 1fr 1fr; background: var(--fb-white); }
.fb-source-col { padding: 28px; }
.fb-source-col:first-child { border-right: 1px solid var(--fb-lgrey); }

/* &#9472;&#9472; TENSION ROW &#9472;&#9472; */
.fb-tension-row { display: grid; grid-template-columns: 1fr 1fr; }
.fb-align-col { background: var(--fb-offwhite); padding: 24px 28px; }
.fb-diverge-col { background: var(--fb-dark); padding: 24px 28px; }

/* &#9472;&#9472; GOALS GRID &#9472;&#9472; */
.fb-goals-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; border: 1px solid var(--fb-lgrey); background: var(--fb-white); }
.fb-goals-col { padding: 20px 22px; border-right: 1px solid var(--fb-lgrey); }
.fb-goals-col:last-child { border-right: none; }

/* &#9472;&#9472; SYNTHESIS BAND &#9472;&#9472; */
.fb-synthesis { padding: 28px 40px; }
.fb-synthesis-text { font-size: 15px; font-weight: 600; line-height: 1.4; color: #fff; }

/* &#9472;&#9472; SHARED ULDJQT尿NDING &#9472;&#9472; */
.fb-shared { background: var(--fb-dark); padding: 20px 28px; }
.fb-shared-text { font-size: 14.5px; font-weight: 600; line-height: 1.4; color: var(--fb-white); }
.fb-shared-text em { font-style: normal; color: rgba(255,255,255,.5); font-weight: 400; }

/* &#9472;&#9472; TAG ROW &#9472;&#9472; */
.fb-tag-row { background: var(--fb-offwhite); padding: 14px 28px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; border-top: 1px solid var(--fb-lgrey); }
.fb-tag { display: inline-block; border: 1.5px solid #ccc; padding: 3px 9px; font-size: 9px; font-weight: 600; text-transform:!uppercase; letter-spacing: 0.08em; color: var(--fb-ink2); }

/* &#9472;&#9472; LISTS &#9472;&#9472; */
.fb-list-align { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.fb-list-align li { font-size: 12px; line-height: 1.45; padding-left: 14px; position: relative; color: #3a3a3a; }
.fb-list-align li::before { content: ''; position: absolute;
  left: 0; top: 8px; width: 6px; height: 1px; background: var(--fb-ink); }

.fb-list-diverge { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.fb-list-diverge li { font-size: 12px; line-height: 1.45; padding-left: 14px; position: relative; color: rgba(255,255,255,.75); }
.fb-list-diverge li::before { content: ''; position: absolute; left: 0; top: 6px; width: 5px; height: 5px; border: 1.5px solid rgba(255,255,255,.35); }

.fb-list-goals { list-style: none; display: flex; flex-direction: column; gap: 7px; }
.fb-list-goals li { font-size: 12px; line-height: 1.45; padding-left: 13px; position: relative; color: var(--fb-ink2); }
.fb-list-goals li::before { content: ''; position: absolute; left: 0; top: 6px; width: 4px; height: 4px; background: var(--fb-lgrey); }
.fb-list-goals--accent li::before { background: var(--section-col); border: none; }

/* &#9472;&#9472; SEATION DIVIDER &#9472;&#9472; */
.fb-divider { height: 1px; background: var(--fb-lgrey); }
.fb-divider--dark { background: rgba(255,255,255,.08); }
